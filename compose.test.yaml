services:
  postgres-test:
    image: postgres:18-bookworm
    environment:
      POSTGRES_DB: odds_test
      POSTGRES_USER: odds_test
      POSTGRES_PASSWORD: odds_test
    ports:
      - "127.0.0.1:55432:5432"
    tmpfs:
      - /var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U odds_test -d odds_test"]
      interval: 2s
      timeout: 2s
      retries: 20
